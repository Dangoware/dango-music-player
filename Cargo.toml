[package]
name = "dango-backend"
version = "0.1.0"
edition = "2021"

[dependencies]
file-format = { version = "0.17.3", features = ["reader"] }
lofty = "0.14.0"
rusqlite = { version = "0.29.0", features = ["bundled"] }
serde = { version = "1.0.164", features = ["derive"] }
time = "0.3.22"
toml = "0.7.5"
walkdir = "2.3.3"
cpal = "0.15.2"
dasp = "0.11.0"
heapless = "0.7.16"
rb = "0.4.1"
symphonia = { version = "0.5.3", features = ["all-codecs"] }
serde_json = "1.0.104"
