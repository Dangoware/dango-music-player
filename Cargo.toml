[package]
name = "dango-backend"
version = "0.1.0"
edition = "2021"

[dependencies]
file-format = { version = "0.17.3", features = ["reader", "serde"] }
lofty = "0.14.0"
rusqlite = { version = "0.29.0", features = ["bundled"] }
serde = { version = "1.0.164", features = ["derive"] }
time = "0.3.22"
toml = "0.7.5"
walkdir = "2.3.3"
cpal = "0.15.2"
heapless = "0.7.16"
rb = "0.4.1"
symphonia = { version = "0.5.3", features = ["all-codecs"] }
serde_json = "1.0.104"
cue = "2.0.0"
async-std = "1.12.0"
async-trait = "0.1.73"
md-5 = "0.10.5"
surf = "2.3.2"
futures = "0.3.28"

[profile.release]
strip = false
lto = false
